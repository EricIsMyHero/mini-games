<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Card Battle — Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #6C5CE7;
    --secondary: #00CEC9;
    --accent: #FD79A8;
    --gold: #EF9F27;
    --bg: #0a0a14;
    --bg2: #0f0f1e;
    --bg3: #141428;
    --surface: rgba(255,255,255,0.04);
    --surface2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8e8f0;
    --muted: #6a6a8a;
    --success: #00CEC9;
    --danger: #FD79A8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { cursor: none; }
  body {
    font-family: 'Arial', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Custom cursor */
  #cursor {
    width: 20px; height: 20px;
    border: 2px solid var(--primary);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transition: transform .15s, border-color .15s;
    transform: translate(-50%, -50%);
  }
  #cursor.click { transform: translate(-50%,-50%) scale(1.6); border-color: var(--accent); }
  #cursor-dot {
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
  }

  /* Background */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  #root {
    max-width: 760px;
    margin: 0 auto;
    padding: 14px;
    position: relative;
    z-index: 1;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  .back-link {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    font-size: 11px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    letter-spacing: .04em;
    color: var(--muted);
    text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    transition: all .15s;
  }
  .back-link:hover { color: var(--text); border-color: var(--border2); }

  /* TOP BAR */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    backdrop-filter: blur(12px);
  }
  .game-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 900;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: .05em;
  }
  .xp-bar-wrap {
    flex: 1;
    margin: 0 16px;
  }
  .xp-label {
    font-size: 10px;
    color: var(--gold);
    font-family: 'Orbitron', sans-serif;
    letter-spacing: .08em;
    margin-bottom: 3px;
  }
  .xp-track {
    height: 6px;
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--accent));
    border-radius: 4px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }
  .top-stats {
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .stat-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
  }
  .stat-chip span { color: var(--text); }

  /* DECK BUILDER */
  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: .12em;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .deck-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .deck-slots {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    min-height: 54px;
  }
  .slot {
    width: 56px; height: 32px;
    border-radius: 8px;
    border: 1px dashed var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    text-align: center;
    padding: 2px 4px;
    line-height: 1.2;
    font-weight: 600;
  }
  .slot.filled {
    border-style: solid;
    font-size: 8px;
    font-weight: 700;
    animation: slotPop .3s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes slotPop {
    from { transform: scale(.6); opacity: .3; }
    to { transform: scale(1); opacity: 1; }
  }
  .slot.filled:hover { opacity: .5; transform: scale(.92); }

  .deck-info {
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 10px;
  }
  .deck-count-big {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
  }
  .deck-count-label { font-size: 11px; color: var(--muted); }

  .filter-row {
    display: flex; gap: 5px; flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .fbtn {
    padding: 5px 13px;
    font-size: 11px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    border: 1px solid var(--border2);
    border-radius: 20px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .04em;
  }
  .fbtn:hover { color: var(--text); border-color: rgba(255,255,255,.3); }
  .fbtn.active {
    background: rgba(108,92,231,.2);
    color: var(--primary);
    border-color: var(--primary);
    box-shadow: 0 0 12px rgba(108,92,231,.25);
  }

  .all-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px,1fr));
    gap: 7px;
    margin-bottom: 14px;
  }
  .pcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 8px 9px;
    cursor: pointer;
    position: relative;
    text-align: center;
    transition: transform .15s cubic-bezier(.34,1.56,.64,1), border-color .15s, box-shadow .15s;
  }
  .pcard:hover { transform: translateY(-4px) scale(1.04); border-color: var(--primary); box-shadow: 0 0 20px rgba(108,92,231,.35); }
  .pcard.selected { border: 1.5px solid var(--primary); background: rgba(108,92,231,.12); box-shadow: 0 0 16px rgba(108,92,231,.3); }
  .pcard.dimmed { opacity: .28; cursor: default; }
  .pcard.dimmed:hover { transform: none; box-shadow: none; }
  .pcard-cost {
    position: absolute; top: 5px; right: 5px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    font-size: 9px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', sans-serif;
  }
  .pcard-icon { font-size: 22px; margin: 2px 0 4px; line-height: 1; }
  .pcard-name { font-size: 9px; font-weight: 700; color: #eee; margin-bottom: 4px; line-height: 1.2; text-transform: uppercase; letter-spacing: .04em; }
  .pcard-type { font-size: 8px; padding: 2px 7px; border-radius: 8px; display: inline-block; font-weight: 600; letter-spacing: .04em; }

  .t-attack  { background: rgba(216,90,48,.15); color: #f0997b; border: 1px solid rgba(216,90,48,.3); }
  .t-heal    { background: rgba(0,206,201,.12); color: #00CEC9; border: 1px solid rgba(0,206,201,.25); }
  .t-shield  { background: rgba(55,138,221,.12); color: #85b7eb; border: 1px solid rgba(55,138,221,.25); }
  .t-buff    { background: rgba(108,92,231,.15); color: #afa9ec; border: 1px solid rgba(108,92,231,.3); }
  .t-debuff  { background: rgba(239,159,39,.12); color: #ef9f27; border: 1px solid rgba(239,159,39,.25); }
  .t-poison  { background: rgba(99,153,34,.12); color: #97c459; border: 1px solid rgba(99,153,34,.25); }

  .start-btn {
    width: 100%;
    padding: 13px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: .08em;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .start-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(transparent, rgba(255,255,255,.08), transparent);
    transform: rotate(45deg) translateY(-100%);
    transition: transform .4s;
  }
  .start-btn:hover::after { transform: rotate(45deg) translateY(60%); }
  .start-btn:hover { box-shadow: 0 0 30px rgba(108,92,231,.5); transform: translateY(-1px); }
  .start-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }

  /* BATTLE HUD */
  .hud {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    backdrop-filter: blur(8px);
  }
  .hp-block { display: flex; flex-direction: column; gap: 4px; }
  .hp-label {
    font-size: 9px;
    font-family: 'Orbitron', sans-serif;
    color: var(--muted);
    letter-spacing: .12em;
  }
  .hp-bar-bg {
    height: 8px;
    border-radius: 4px;
    background: rgba(255,255,255,.06);
    overflow: hidden;
    position: relative;
  }
  .hp-bar {
    height: 100%;
    border-radius: 4px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .hp-bar::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .hp-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }
  .hp-name { font-size: 10px; font-weight: 600; color: var(--muted); }
  .vs-badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface2);
    letter-spacing: .08em;
    white-space: nowrap;
  }

  /* ENERGY */
  .energy-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
  }
  .energy-label { font-size: 10px; font-family: 'Orbitron', sans-serif; color: var(--gold); letter-spacing: .1em; min-width: 54px; }
  .pips { display: flex; gap: 3px; flex: 1; }
  .pip {
    flex: 1;
    height: 7px;
    border-radius: 3px;
    background: rgba(255,255,255,.07);
    transition: all .25s;
  }
  .pip.on {
    background: linear-gradient(90deg, var(--gold), #ffd000);
    box-shadow: 0 0 6px rgba(239,159,39,.5);
  }
  .turn-txt { font-size: 11px; color: var(--muted); font-family: 'Orbitron', sans-serif; letter-spacing: .06em; }

  /* HAND */
  .hand-lbl {
    font-size: 9px;
    font-family: 'Orbitron', sans-serif;
    color: var(--muted);
    letter-spacing: .12em;
    margin-bottom: 7px;
  }
  .hand {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    min-height: 120px;
    margin-bottom: 8px;
  }

  /* GAME CARDS */
  .gcard {
    width: 98px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 9px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: relative;
    transition: transform .2s cubic-bezier(.34,1.56,.64,1), border-color .15s, box-shadow .15s;
    backdrop-filter: blur(4px);
  }
  .gcard::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(255,255,255,.06), transparent);
    pointer-events: none;
  }
  .gcard:hover:not(.cant) {
    transform: translateY(-10px) scale(1.07) rotateZ(1deg);
    border-color: var(--primary);
    box-shadow: 0 12px 36px rgba(108,92,231,.4), 0 0 0 1px rgba(108,92,231,.3);
  }
  .gcard.cant { opacity: .3; cursor: not-allowed; }
  .gcard.cant:hover { transform: none; box-shadow: none; }
  .gcard.play-anim { animation: cardPlay .4s cubic-bezier(.4,0,.2,1) forwards; }
  @keyframes cardPlay {
    0%   { transform: translateY(0) scale(1) rotateZ(0); opacity: 1; }
    30%  { transform: translateY(-24px) scale(1.15) rotateZ(3deg); opacity: 1; }
    100% { transform: translateY(80px) scale(.5) rotateZ(-5deg); opacity: 0; }
  }
  .gcard-cost {
    position: absolute; top: 6px; right: 6px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    font-size: 8px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', sans-serif;
    box-shadow: 0 2px 8px rgba(108,92,231,.4);
  }
  .gcard-icon { font-size: 20px; text-align: center; line-height: 1; margin-bottom: 2px; }
  .gcard-name { font-size: 9px; font-weight: 700; color: #eee; line-height: 1.2; text-transform: uppercase; letter-spacing: .04em; }
  .gcard-stat {
    font-size: 9px; color: var(--muted);
    display: flex; justify-content: space-between;
  }
  .gcard-stat span:last-child { color: #ddd; font-weight: 700; }

  /* STATUS ROWS */
  .status-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
    margin-bottom: 8px;
  }
  .ai-row, .played-row {
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 11px;
    min-height: 36px;
    display: flex;
    align-items: center;
    gap: 5px;
    flex-wrap: wrap;
    font-weight: 600;
    color: var(--muted);
  }
  .played-row { border-color: rgba(0,206,201,.15); }
  .played-row .plbl { font-size: 9px; color: var(--muted); font-family: 'Orbitron', sans-serif; letter-spacing: .06em; }
  .played-tag {
    background: rgba(0,206,201,.1);
    border: 1px solid rgba(0,206,201,.2);
    color: var(--secondary);
    border-radius: 5px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 700;
  }

  .log-box {
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 8px;
    min-height: 40px;
  }
  .log-box .hit  { color: var(--accent); font-weight: 700; }
  .log-box .heal-t { color: var(--success); font-weight: 700; }

  .btn-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .gbtn {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: .05em;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    border-radius: 10px;
    cursor: pointer;
    transition: all .15s;
  }
  .gbtn:hover { background: var(--surface2); border-color: rgba(255,255,255,.25); transform: translateY(-1px); }
  .gbtn.end-btn {
    background: rgba(253,121,168,.1);
    border-color: rgba(253,121,168,.3);
    color: var(--accent);
  }
  .gbtn.end-btn:hover { background: rgba(253,121,168,.2); box-shadow: 0 0 16px rgba(253,121,168,.2); }

  /* DAMAGE POP */
  .dmg-pop {
    position: absolute;
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    pointer-events: none;
    animation: popUp .8s cubic-bezier(.4,0,.2,1) forwards;
    z-index: 50;
    white-space: nowrap;
    text-shadow: 0 0 12px currentColor;
  }
  @keyframes popUp {
    0%   { transform: translateY(0) scale(.7); opacity: 1; }
    20%  { transform: translateY(-10px) scale(1.1); opacity: 1; }
    100% { transform: translateY(-50px) scale(.8); opacity: 0; }
  }

  /* LEADERBOARD */
  .leaderboard {
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-top: 14px;
  }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    min-width: 20px;
    text-align: center;
  }
  .lb-rank.top1 { color: #ffd700; }
  .lb-rank.top2 { color: #c0c0c0; }
  .lb-rank.top3 { color: #cd7f32; }
  .lb-name { flex: 1; font-weight: 600; }
  .lb-score { font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--primary); }
  .lb-you { color: var(--secondary) !important; }

  /* DAILY REWARD */
  .daily-reward {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(239,159,39,.07);
    border: 1px solid rgba(239,159,39,.2);
    border-radius: 12px;
    margin-bottom: 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .daily-icon { font-size: 20px; }
  .daily-text { flex: 1; }
  .daily-text strong { color: var(--gold); display: block; font-size: 13px; }
  .daily-btn {
    padding: 5px 14px;
    background: linear-gradient(135deg, var(--gold), #f0a000);
    color: #000;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .06em;
    transition: all .15s;
  }
  .daily-btn:hover { transform: scale(1.05); box-shadow: 0 0 14px rgba(239,159,39,.4); }
  .daily-btn:disabled { opacity: .4; cursor: default; transform: none; }

  /* RESULT SCREEN */
  .result-screen {
    text-align: center;
    padding: 40px 16px;
    position: relative;
  }
  .result-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 900;
    margin-bottom: 6px;
    letter-spacing: .04em;
  }
  .result-title.win  { background: linear-gradient(90deg, var(--secondary), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .result-title.lose { background: linear-gradient(90deg, var(--accent), #ff4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .result-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; font-weight: 500; }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .rstat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 24px;
    min-width: 90px;
    backdrop-filter: blur(8px);
  }
  .rstat-val { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 700; color: var(--primary); }
  .rstat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 600; letter-spacing: .04em; }
  .result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .confetti-wrap { position: absolute; top: 0; left: 0; right: 0; height: 200px; overflow: hidden; pointer-events: none; }
  .conf { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: confettiFall linear forwards; }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotateZ(0deg); opacity: 1; }
    100% { transform: translateY(220px) rotateZ(720deg); opacity: 0; }
  }

  /* STATUS BADGES */
  .status-badges {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .badge {
    padding: 3px 9px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: .04em;
  }
  .badge-poison { background: rgba(99,153,34,.15); border: 1px solid rgba(99,153,34,.3); color: #97c459; }
  .badge-buff   { background: rgba(108,92,231,.15); border: 1px solid rgba(108,92,231,.3); color: #afa9ec; }
  .badge-debuff { background: rgba(239,159,39,.12); border: 1px solid rgba(239,159,39,.25); color: #ef9f27; }

  /* OPPONENT THINKING */
  .thinking-dots span {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--primary);
    border-radius: 50%;
    margin: 0 2px;
    animation: dotBounce .8s infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: .15s; }
  .thinking-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: scale(.6); opacity: .4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Score counter anim */
  @keyframes countUp { from { transform: scale(1.3); color: var(--gold); } to { transform: scale(1); } }
  .score-anim { animation: countUp .4s ease; }

  /* mobile */
  @media (max-width: 500px) {
    .deck-grid { grid-template-columns: 1fr; }
    .gcard { width: 88px; }
    .status-panel { grid-template-columns: 1fr; }
    .all-cards { grid-template-columns: repeat(auto-fill, minmax(84px,1fr)); }
  }
</style>

<script>
/* ── CURSOR ── */
const cur = document.getElementById('cursor');
const curDot = document.getElementById('cursor-dot');
let mx=0,my=0;
document.addEventListener('mousemove', e=>{
  mx=e.clientX; my=e.clientY;
  curDot.style.left=mx+'px'; curDot.style.top=my+'px';
  cur.style.left=mx+'px'; cur.style.top=my+'px';
});
document.addEventListener('mousedown',()=>cur.classList.add('click'));
document.addEventListener('mouseup',()=>cur.classList.remove('click'));

/* ── BACKGROUND PARTICLES ── */
const bgCanvas = document.getElementById('bg-canvas');
const bctx = bgCanvas.getContext('2d');
let bW, bH, particles=[];

function resizeBg(){
  bW = bgCanvas.width = window.innerWidth;
  bH = bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

const COLORS = ['rgba(108,92,231,','rgba(0,206,201,','rgba(253,121,168,'];
for(let i=0;i<60;i++){
  particles.push({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    r: Math.random()*1.5+.3,
    dx: (Math.random()-.5)*.3,
    dy: (Math.random()-.5)*.3,
    c: COLORS[Math.floor(Math.random()*COLORS.length)],
    a: Math.random()*.4+.1
  });
}

function animBg(){
  bctx.clearRect(0,0,bW,bH);
  particles.forEach(p=>{
    p.x+=p.dx; p.y+=p.dy;
    if(p.x<0||p.x>bW) p.dx*=-1;
    if(p.y<0||p.y>bH) p.dy*=-1;
    bctx.beginPath();
    bctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bctx.fillStyle=p.c+p.a+')';
    bctx.fill();
  });
  requestAnimationFrame(animBg);
}
animBg();

/* ── PERSISTENCE ── */
function loadSave(){
  try{return JSON.parse(localStorage.getItem('cbSave'))||{};}catch{return {};}
}
function writeSave(d){ try{localStorage.setItem('cbSave',JSON.stringify(d));}catch{} }

let save = loadSave();
let playerXP   = save.xp    || 0;
let playerLevel= save.level || 1;
let playerWins = save.wins  || 0;
let playerLoss = save.losses|| 0;
let dailyClaimed = save.daily === getTodayStr();
let leaderboard = save.lb || generateFakeLeaders();

function getTodayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function generateFakeLeaders(){
  const names=['Rustam','Aytac','Elnur','Nigar','Fuad','Sevinc','Kamran','Ləman'];
  return names.map(n=>({name:n, score:Math.floor(Math.random()*2000)+200}))
    .sort((a,b)=>b.score-a.score);
}

function persistSave(){
  writeSave({
    xp:playerXP,level:playerLevel,wins:playerWins,losses:playerLoss,
    daily:dailyClaimed?getTodayStr():'',
    lb:leaderboard
  });
}

function addXP(amount){
  playerXP += amount;
  const needed = playerLevel * 100;
  if(playerXP >= needed){ playerXP -= needed; playerLevel++; }
  updateTopBar();
  persistSave();
}

function updateTopBar(){
  document.getElementById('lvlNum').textContent = playerLevel;
  document.getElementById('winsCount').textContent = playerWins;
  document.getElementById('lossCount').textContent = playerLoss;
  const needed = playerLevel*100;
  document.getElementById('xpFill').style.width = Math.min(100,(playerXP/needed)*100)+'%';
}

function claimDaily(){
  if(dailyClaimed) return;
  dailyClaimed = true;
  addXP(50);
  const btn = document.getElementById('claimBtn');
  btn.textContent = '✓';
  btn.disabled = true;
  persistSave();
}

function renderLeaderboard(){
  // Insert player into lb
  const playerScore = playerWins * 100 + playerXP;
  let lb = [...leaderboard];
  const mIdx = lb.findIndex(x=>x.name==='Sən');
  if(mIdx>=0) lb[mIdx].score=playerScore; else lb.push({name:'Sən',score:playerScore,isYou:true});
  lb.sort((a,b)=>b.score-a.score);
  lb = lb.slice(0,8);

  const el = document.getElementById('lbList');
  el.innerHTML = '';
  lb.forEach((r,i)=>{
    const div = document.createElement('div');
    div.className = 'lb-row';
    const rankClass = i===0?'top1':i===1?'top2':i===2?'top3':'';
    div.innerHTML = `
      <div class="lb-rank ${rankClass}">${i===0?'👑':i+1}</div>
      <div class="lb-name${r.isYou?' lb-you':''}">${r.name}${r.isYou?' (Sən)':''}</div>
      <div class="lb-score">${r.score.toLocaleString()}</div>
    `;
    el.appendChild(div);
  });
}

/* ── DATA ── */
const ICONS = {attack:"⚔",heal:"💚",shield:"🛡",buff:"✨",debuff:"💀",poison:"☠"};
const TYPE_CLS = {attack:"t-attack",heal:"t-heal",shield:"t-shield",buff:"t-buff",debuff:"t-debuff",poison:"t-poison"};

const ALL_CARDS = [
  {id:0, name:"Qılınc",       type:"attack", cost:2, atk:18, shd:0,  heal:0,  crit:.20, poison:0,  buffNext:0,   debuff:0},
  {id:1, name:"Dual Hücum",   type:"attack", cost:4, atk:30, shd:0,  heal:0,  crit:.25, poison:0,  buffNext:0,   debuff:0},
  {id:2, name:"Oxçu",         type:"attack", cost:1, atk:10, shd:0,  heal:0,  crit:.15, poison:0,  buffNext:0,   debuff:0},
  {id:3, name:"Snayper",      type:"attack", cost:3, atk:22, shd:0,  heal:0,  crit:.35, poison:0,  buffNext:0,   debuff:0},
  {id:4, name:"Ninja",        type:"attack", cost:3, atk:25, shd:0,  heal:0,  crit:.40, poison:0,  buffNext:0,   debuff:0},
  {id:5, name:"Həyat Seli",   type:"heal",   cost:2, atk:0,  shd:0,  heal:20, crit:0,   poison:0,  buffNext:0,   debuff:0},
  {id:6, name:"Sürətli Şəfa", type:"heal",   cost:1, atk:0,  shd:0,  heal:12, crit:0,   poison:0,  buffNext:0,   debuff:0},
  {id:7, name:"Böyük Şəfa",   type:"heal",   cost:4, atk:0,  shd:0,  heal:35, crit:0,   poison:0,  buffNext:0,   debuff:0},
  {id:8, name:"Healer",       type:"heal",   cost:3, atk:5,  shd:5,  heal:18, crit:.10, poison:0,  buffNext:0,   debuff:0},
  {id:9, name:"Qalxan",       type:"shield", cost:2, atk:5,  shd:18, heal:0,  crit:.10, poison:0,  buffNext:0,   debuff:0},
  {id:10,name:"Dəmir Zireh",  type:"shield", cost:3, atk:0,  shd:28, heal:0,  crit:0,   poison:0,  buffNext:0,   debuff:0},
  {id:11,name:"Titan",        type:"shield", cost:5, atk:20, shd:35, heal:0,  crit:.15, poison:0,  buffNext:0,   debuff:0},
  {id:12,name:"Güc Ruhu",     type:"buff",   cost:2, atk:8,  shd:5,  heal:5,  crit:.10, poison:0,  buffNext:.30, debuff:0},
  {id:13,name:"Bərk Yumruq",  type:"buff",   cost:3, atk:15, shd:0,  heal:0,  crit:.10, poison:0,  buffNext:.50, debuff:0},
  {id:14,name:"Büyücü",       type:"buff",   cost:4, atk:12, shd:8,  heal:8,  crit:.15, poison:3,  buffNext:.20, debuff:.10},
  {id:15,name:"Zəhərli Ox",   type:"poison", cost:2, atk:8,  shd:0,  heal:0,  crit:.15, poison:6,  buffNext:0,   debuff:0},
  {id:16,name:"Zəhər Buludu", type:"poison", cost:3, atk:5,  shd:0,  heal:0,  crit:.10, poison:10, buffNext:0,   debuff:0},
  {id:17,name:"Zəiflik",      type:"debuff", cost:2, atk:5,  shd:0,  heal:0,  crit:.10, poison:0,  buffNext:0,   debuff:.25},
  {id:18,name:"Qaranlıq Bağ", type:"debuff", cost:3, atk:8,  shd:0,  heal:0,  crit:.10, poison:0,  buffNext:0,   debuff:.40},
  {id:19,name:"Döyüşçü",      type:"attack", cost:2, atk:14, shd:6,  heal:0,  crit:.20, poison:0,  buffNext:0,   debuff:0},
];

/* ── STATE ── */
let selectedDeck=[], activeFilter="all";
let pHP,aHP,energy,turn,playerDeck,hand,deckIdx;
let pPoison,aPoison,pPoisonDmg,aPoisonDmg;
let pDebuff,aDebuff,pBuffNext,aBuffNext;
let turnsPlayed,playedThisTurn=[],playerQueuedCards=[],turnsBlocked=false;
let aiDeck,aiHand,aiDeckIdx;

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goToDeck(){
  show("deckScreen");
  renderDeckBuilder();
}

function slotStyle(t){
  const m={attack:['rgba(216,90,48,.18)','#f0997b'],heal:['rgba(0,206,201,.12)','#00CEC9'],
    shield:['rgba(55,138,221,.12)','#85b7eb'],buff:['rgba(108,92,231,.15)','#afa9ec'],
    debuff:['rgba(239,159,39,.12)','#ef9f27'],poison:['rgba(99,153,34,.12)','#97c459']};
  return m[t]||['rgba(255,255,255,.04)','#555'];
}

/* ── DECK BUILDER ── */
function renderDeckBuilder(){
  renderSlots(); renderFilterBtns(); renderAllCardsPicker(); updateStartBtn();
  updateTopBar();
  renderLeaderboard();
  // Daily reward state
  const cb = document.getElementById('claimBtn');
  if(dailyClaimed){cb.textContent='✓';cb.disabled=true;}
  // Type breakdown
  const types={};
  selectedDeck.forEach(id=>{const c=ALL_CARDS.find(x=>x.id===id);types[c.type]=(types[c.type]||0)+1;});
  document.getElementById('deckTypeBreakdown').innerHTML =
    Object.entries(types).map(([t,n])=>`<span style="color:var(--muted)">${t}:</span> <b>${n}</b>`).join(' · ') || 'Kart seçilməyib';
}

function renderSlots(){
  const c=document.getElementById("deckSlots");c.innerHTML="";
  for(let i=0;i<8;i++){
    const d=document.createElement("div");d.className="slot";
    if(selectedDeck[i]!==undefined){
      d.classList.add("filled");
      const card=ALL_CARDS.find(x=>x.id===selectedDeck[i]);
      const [bg,col]=slotStyle(card.type);
      d.style.background=bg; d.style.borderColor=col; d.style.color=col;
      d.textContent=card.name; d.title=`${card.name} — çıxar`;
      d.onclick=()=>removeFromDeck(i);
    } else { d.textContent=i+1; }
    c.appendChild(d);
  }
  document.getElementById("deckCountBig").textContent=selectedDeck.length;
}

function renderFilterBtns(){
  const row=document.getElementById("filterRow");row.innerHTML="";
  ["all","attack","heal","shield","buff","debuff","poison"].forEach(f=>{
    const b=document.createElement("button");
    b.className="fbtn"+(activeFilter===f?" active":"");
    b.textContent=f==="all"?"Hamısı":f;
    b.onclick=()=>{activeFilter=f;renderAllCardsPicker();renderFilterBtns();};
    row.appendChild(b);
  });
}

function renderAllCardsPicker(){
  const c=document.getElementById("allCards");c.innerHTML="";
  const filtered=activeFilter==="all"?ALL_CARDS:ALL_CARDS.filter(x=>x.type===activeFilter);
  filtered.forEach(card=>{
    const sel=selectedDeck.includes(card.id);
    const full=selectedDeck.length>=8&&!sel;
    const d=document.createElement("div");
    d.className="pcard"+(sel?" selected":"")+(full?" dimmed":"");
    d.innerHTML=`
      <div class="pcard-cost">${card.cost}</div>
      <div class="pcard-icon">${ICONS[card.type]||"?"}</div>
      <div class="pcard-name">${card.name}</div>
      <div class="pcard-type ${TYPE_CLS[card.type]}">${card.type}</div>
    `;
    if(!full||sel){
      d.onclick=()=>{
        if(sel){removeFromDeckById(card.id);}
        else if(selectedDeck.length<8){selectedDeck.push(card.id);renderDeckBuilder();}
      };
    }
    c.appendChild(d);
  });
}

function removeFromDeck(i){selectedDeck.splice(i,1);renderDeckBuilder();}
function removeFromDeckById(id){const i=selectedDeck.indexOf(id);if(i>=0){selectedDeck.splice(i,1);renderDeckBuilder();}}

function updateStartBtn(){
  const n=selectedDeck.length;
  const b=document.getElementById("startBtn");
  b.disabled=n<8;
  b.textContent=n>=8?"⚔ DÖYÜŞƏ BAŞLA":`⚔ DÖYÜŞƏ BAŞLA (${n}/8)`;
}

/* ── BATTLE SETUP ── */
function startBattle(){
  pHP=100;aHP=100;energy=4;turn=1;turnsPlayed=0;
  pPoison=0;aPoison=0;pPoisonDmg=0;aPoisonDmg=0;
  pDebuff=0;aDebuff=0;pBuffNext=0;aBuffNext=0;
  playedThisTurn=[];playerQueuedCards=[];turnsBlocked=false;

  const deckCards=selectedDeck.map(id=>ALL_CARDS.find(c=>c.id===id));
  playerDeck=shuffle(deckCards);deckIdx=0;hand=[];

  const allShuffled=shuffle([...ALL_CARDS]);
  aiDeck=allShuffled.slice(0,8);aiDeckIdx=0;aiHand=[];

  drawCards();drawAiCards();
  show("battleScreen");
  renderBattle();
  document.getElementById("logBox").innerHTML="Kart seçin! Oynamaq üçün klikləyin.";
  document.getElementById("aiRow").innerHTML="AI gözləyir...";
}

function drawCards(){
  const toDraw=4-hand.length;
  for(let i=0;i<toDraw;i++){
    if(deckIdx>=playerDeck.length){playerDeck=shuffle(playerDeck);deckIdx=0;}
    hand.push({...playerDeck[deckIdx++]});
  }
}

function drawAiCards(){
  const toDraw=4-aiHand.length;
  for(let i=0;i<toDraw;i++){
    if(aiDeckIdx>=aiDeck.length){aiDeck=shuffle(aiDeck);aiDeckIdx=0;}
    aiHand.push({...aiDeck[aiDeckIdx++]});
  }
}

/* ── PLAY CARD ── */
function playCard(idx,el){
  const c=hand[idx];
  if(c.cost>energy){flashLog("⚡ Enerji kifayət deyil!");return;}
  if(pHP<=0||aHP<=0||turnsBlocked)return;
  el.classList.add("play-anim");
  turnsBlocked=true;
  setTimeout(()=>{
    energy-=c.cost;turnsPlayed++;
    playedThisTurn.push(c.name);playerQueuedCards.push(c);
    hand.splice(idx,1);turnsBlocked=false;
    document.getElementById("logBox").innerHTML=`<b>${c.name}</b> seçildi. Turu bitirərək tətbiq edin.`;
    checkEnd();renderBattle();renderPlayedRow();
  },350);
}

/* ── TURN LOGIC ── */
function runPlayerCards(cards,idx,done){
  if(idx>=cards.length||aHP<=0||pHP<=0){done();return;}
  const c=cards[idx];applyPlayerCard(c);renderBattle();
  setTimeout(()=>runPlayerCards(cards,idx+1,done),650);
}

function runAiCards(cards,idx,done){
  if(idx>=cards.length||pHP<=0||aHP<=0){done();return;}
  const c=cards[idx];applyCardEffect(null,c);
  const row=document.getElementById("aiRow");
  row.innerHTML=`AI oynadı: <b>${c.name}</b> ${c.atk>0?`⚔${c.atk}`:''}${c.heal>0?`💚${c.heal}`:''}`;
  renderBattle();
  setTimeout(()=>runAiCards(cards,idx+1,done),650);
}

function skipTurnForEnergy(){
  if(turnsBlocked)return;
  turnsBlocked=true;energy+=4;
  document.getElementById("logBox").innerHTML="Tur keçildi — <b style='color:var(--gold)'>+4 enerji</b> qazandın!";
  setTimeout(()=>{turn++;turnsBlocked=false;renderBattle();},400);
}

function endTurn(){
  if(pHP<=0||aHP<=0||turnsBlocked)return;
  turnsBlocked=true;
  document.getElementById("logBox").innerHTML="Sənin kartların tətbiq olunur...";
  runPlayerCards(playerQueuedCards,0,()=>{
    playerQueuedCards=[];
    if(pHP<=0||aHP<=0){checkEnd();return;}
    const aiRow=document.getElementById("aiRow");
    aiRow.innerHTML=`AI düşünür... <span class="thinking-dots"><span></span><span></span><span></span></span>`;
    setTimeout(()=>{
      let aiEnergy=4;const aiPlayed=[];let att=0;
      while(aiEnergy>0&&att<10){
        const c=aiChooseFromHand(aiEnergy);if(!c)break;
        aiEnergy-=c.cost;
        const ci=aiHand.indexOf(c);aiHand.splice(ci,1);
        aiPlayed.push(c);att++;
      }
      runAiCards(aiPlayed,0,()=>{
        if(pHP<=0){checkEnd();return;}
        turn++;energy+=2;
        const msgs=[];
        if(pPoison>0){pHP-=pPoisonDmg;pPoison--;if(pPoison===0)pPoisonDmg=0;msgs.push(`☠ Zəhər -${pPoisonDmg||pPoisonDmg}HP`);}
        if(aPoison>0){aHP-=aPoisonDmg;aPoison--;if(aPoison===0)aPoisonDmg=0;msgs.push(`☠ AI zəhər -${aPoisonDmg||aPoisonDmg}HP`);}
        aHP=Math.max(0,aHP);pHP=Math.max(0,pHP);
        drawCards();drawAiCards();playedThisTurn=[];turnsBlocked=false;
        document.getElementById("logBox").innerHTML=msgs.length?msgs.join(" | "):`Tur ${turn} başladı! <b style='color:var(--gold)'>+2 enerji</b>`;
        document.getElementById("aiRow").innerHTML="AI gözləyir...";
        checkEnd();renderBattle();renderPlayedRow();
      });
    }, 600);
  });
}

/* ── EFFECTS ── */
function applyPlayerCard(c){
  let pAtk=c.atk*(1+pBuffNext);pBuffNext=0;
  const wasCrit=Math.random()<c.crit;
  if(wasCrit)pAtk*=1.5;
  const dAI=Math.max(0,pAtk);
  pHP+=c.heal;aHP=Math.max(0,aHP-dAI);
  if(c.poison>0){aPoison=c.poison;aPoisonDmg=Math.floor(c.poison);}
  if(c.buffNext>0)pBuffNext=c.buffNext;
  if(c.debuff>0)aDebuff=c.debuff;
  const parts=[];
  if(dAI>0)parts.push(`<span class="hit">${wasCrit?'💥 KRİT ':''}AI -${Math.floor(dAI)}HP</span>`);
  if(c.heal>0)parts.push(`<span class="heal-t">+${c.heal}HP</span>`);
  if(c.buffNext>0)parts.push(`<span style="color:#afa9ec">növbəti +${Math.round(c.buffNext*100)}%</span>`);
  if(c.debuff>0)parts.push(`<span style="color:#ef9f27">AI -${Math.round(c.debuff*100)}% zəiflər</span>`);
  if(c.poison>0)parts.push(`<span style="color:#97c459">☠ ${c.poison}t zəhər</span>`);
  document.getElementById("logBox").innerHTML=`<b>${c.name}</b> — ${parts.join(", ")||"effekt yoxdur"}`;
  showHPPop(Math.floor(dAI),false);
}

function applyCardEffect(pc,aiC){
  let aAtk=aiC.atk*(1+aBuffNext);aBuffNext=0;
  if(Math.random()<aiC.crit)aAtk*=1.5;
  aAtk*=(1-pDebuff);pDebuff=0;
  const dP=Math.max(0,aAtk);
  aHP+=aiC.heal;pHP=Math.max(0,pHP-dP);
  if(aiC.poison>0){pPoison=aiC.poison;pPoisonDmg=Math.floor(aiC.poison);}
  if(aiC.buffNext>0)aBuffNext=aiC.buffNext;
  if(aiC.debuff>0)pDebuff=aiC.debuff;
  showHPPop(Math.floor(dP),true);
  aHP=Math.max(0,aHP);pHP=Math.max(0,pHP);
}

function flashLog(msg){
  const l=document.getElementById("logBox");
  l.innerHTML=`<span style="color:var(--accent)">${msg}</span>`;
  setTimeout(()=>{l.innerHTML="Kart seçin!";},1400);
}

/* ── AI ── */
function aiChooseFromHand(avail){
  const pool=aiHand.filter(c=>c.cost<=avail);if(!pool.length)return null;
  if(aHP<25){const h=pool.find(c=>c.type==="heal");if(h)return h;}
  if(aHP<45){const s=pool.find(c=>c.type==="shield");if(s)return s;}
  if(turn>7)return pool.sort((a,b)=>b.atk-a.atk)[0];
  return pool.sort((a,b)=>(b.atk+b.shd*.5+b.heal*.3)-(a.atk+a.shd*.5+a.heal*.3))[0];
}

/* ── END CHECK ── */
function checkEnd(){
  if(pHP>0&&aHP>0)return;
  const win=aHP<=0&&pHP>0;
  setTimeout(()=>{
    let title,sub,xpGain;
    if(pHP<=0&&aHP<=0){title="Bərabərə!";sub="İkisi də eyni anda məğlub oldu!";xpGain=20;}
    else if(pHP<=0){title="Məğlubiyyət";sub="AI qalib gəldi. Daha güclü deck qur!";xpGain=10;playerLoss++;} 
    else{title="Qalibiyyət! 🎉";sub="Rəqib məğlub edildi!";xpGain=50+Math.floor(pHP/2);playerWins++;}
    addXP(xpGain);persistSave();

    const rt=document.getElementById("resultTitle");
    rt.textContent=title;
    rt.className='result-title '+(win?'win':'lose');
    document.getElementById("resultSub").textContent=sub;
    document.getElementById("rHP").textContent=Math.max(0,Math.floor(pHP));
    document.getElementById("rTurns").textContent=turnsPlayed;
    document.getElementById("rXP").textContent='+'+xpGain;

    if(win)spawnConfetti();
    show("resultScreen");
  },480);
}

function spawnConfetti(){
  const wrap=document.getElementById("confettiWrap");
  wrap.innerHTML='';
  const cols=['#6C5CE7','#00CEC9','#FD79A8','#EF9F27','#fff'];
  for(let i=0;i<40;i++){
    const d=document.createElement('div');
    d.className='conf';
    d.style.left=Math.random()*100+'%';
    d.style.background=cols[Math.floor(Math.random()*cols.length)];
    d.style.animationDuration=(Math.random()*.8+.6)+'s';
    d.style.animationDelay=(Math.random()*.5)+'s';
    wrap.appendChild(d);
  }
}

/* ── RENDER ── */
function renderBattle(){
  const ph=Math.max(0,Math.floor(pHP));const ah=Math.max(0,Math.floor(aHP));
  document.getElementById("pHP").textContent=ph;
  document.getElementById("aHP").textContent=ah;
  document.getElementById("pBar").style.width=ph+"%";
  document.getElementById("aBar").style.width=ah+"%";
  document.getElementById("turnBadge").innerHTML=`TUR<br>${turn}`;
  document.getElementById("turnTxt").textContent='T'+turn;

  const pipsEl=document.getElementById("pips");pipsEl.innerHTML="";
  for(let i=0;i<10;i++){
    const d=document.createElement("div");
    d.className="pip"+(i<energy?" on":"");
    pipsEl.appendChild(d);
  }
  renderHand();renderPlayedRow();renderStatusBadges();
}

function renderStatusBadges(){
  const el=document.getElementById('statusBadges');el.innerHTML='';
  if(pPoison>0)el.innerHTML+=`<span class="badge badge-poison">☠ Zəhər ${pPoison}t</span>`;
  if(aPoison>0)el.innerHTML+=`<span class="badge badge-poison">☠ AI zəhər ${aPoison}t</span>`;
  if(pBuffNext>0)el.innerHTML+=`<span class="badge badge-buff">✨ +${Math.round(pBuffNext*100)}%</span>`;
  if(aDebuff>0)el.innerHTML+=`<span class="badge badge-debuff">💀 AI -${Math.round(aDebuff*100)}%</span>`;
}

function renderHand(){
  const h=document.getElementById("hand");h.innerHTML="";
  hand.forEach((c,i)=>{
    const can=c.cost<=energy;
    const div=document.createElement("div");
    div.className="gcard"+(can?"":" cant");
    div.innerHTML=`
      <div class="gcard-cost">${c.cost}</div>
      <div class="gcard-icon">${ICONS[c.type]||""}</div>
      <div class="gcard-name">${c.name}</div>
      ${c.atk>0?`<div class="gcard-stat"><span>ATK</span><span>${c.atk}</span></div>`:""}
      ${c.shd>0?`<div class="gcard-stat"><span>SHD</span><span>${c.shd}</span></div>`:""}
      ${c.heal>0?`<div class="gcard-stat"><span>HEAL</span><span>+${c.heal}</span></div>`:""}
      ${c.crit>0?`<div class="gcard-stat"><span>CRIT</span><span>${Math.round(c.crit*100)}%</span></div>`:""}
      ${c.poison>0?`<div class="gcard-stat"><span>☠</span><span>${c.poison}t</span></div>`:""}
      ${c.buffNext>0?`<div class="gcard-stat"><span>BUFF</span><span>+${Math.round(c.buffNext*100)}%</span></div>`:""}
      ${c.debuff>0?`<div class="gcard-stat"><span>DEB</span><span>-${Math.round(c.debuff*100)}%</span></div>`:""}
    `;
    if(can)div.onclick=()=>playCard(i,div);
    h.appendChild(div);
  });
}

function renderPlayedRow(){
  const list=document.getElementById("playedList");
  if(!playedThisTurn.length){
    list.innerHTML=`<span style="color:var(--muted)">heç bir kart oynanmayıb</span>`;return;
  }
  list.innerHTML=playedThisTurn.map(n=>`<span class="played-tag">${n}</span>`).join(" ");
}

/* ── DAMAGE POP ── */
function showHPPop(dmg,isPlayer){
  if(!dmg)return;
  const el=document.getElementById(isPlayer?"pHP":"aHP");
  const rootEl=document.getElementById("root");
  const r=el.getBoundingClientRect();const rr=rootEl.getBoundingClientRect();
  const d=document.createElement("div");
  d.className="dmg-pop";
  d.style.left=(r.left-rr.left+r.width/2)+'px';
  d.style.top=(r.top-rr.top)+'px';
  d.style.color=isPlayer?"var(--accent)":"var(--success)";
  d.textContent="-"+dmg;
  rootEl.style.position="relative";
  rootEl.appendChild(d);
  setTimeout(()=>d.remove(),820);
}

/* ── INIT ── */
updateTopBar();
renderDeckBuilder();
</script>
